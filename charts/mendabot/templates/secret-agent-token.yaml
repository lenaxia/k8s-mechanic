apiVersion: v1
kind: Secret
metadata:
  name: mendabot-agent-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mendabot.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ include "mendabot.agentSAName" . }}
type: kubernetes.io/service-account-token
