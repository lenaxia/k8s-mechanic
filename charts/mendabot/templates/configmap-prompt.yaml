apiVersion: v1
kind: ConfigMap
metadata:
  # NOTE: This name is hardcoded to "opencode-prompt" because internal/controller/job.go
  # mounts this ConfigMap by that exact name at compile time. Changing it here without
  # a corresponding code change will cause all agent Jobs to fail at container creation.
  # Multiple Helm releases in the same namespace will collide on this name.
  name: opencode-prompt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mendabot.labels" . | nindent 4 }}
data:
  prompt.txt: |
    {{- if .Values.prompt.override }}
    {{- .Values.prompt.override | nindent 4 }}
    {{- else }}
    {{- $content := .Files.Get (printf "files/prompts/%s.txt" .Values.prompt.name) }}
    {{- if not $content }}
    {{- fail (printf "prompt file files/prompts/%s.txt not found in chart" .Values.prompt.name) }}
    {{- end }}
    {{- $content | nindent 4 }}
    {{- end }}
