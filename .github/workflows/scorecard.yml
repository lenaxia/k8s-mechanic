name: OpenSSF Scorecard

on:
  schedule:
    # Weekly on Monday at 01:30 UTC
    - cron: '30 1 * * 1'
  push:
    branches: [main]

# Restrict default permissions; each job grants only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to the GitHub Security tab.
      security-events: write
      # Required to publish results and retrieve a badge via the OIDC token.
      id-token: write
      # Needed to check out the repository.
      contents: read
      # Needed to read Actions workflow files.
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF REST API for the public badge.
          # Set to false to keep results private.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: results.sarif
