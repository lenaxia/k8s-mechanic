apiVersion: v1
kind: ConfigMap
metadata:
  name: mendabot-circuit-breaker
  namespace: default
  labels:
    app.kubernetes.io/managed-by: mendabot-watcher
    app.kubernetes.io/component: circuit-breaker
data:
  # Last self-remediation timestamp in RFC3339 format
  # Updated automatically by the circuit breaker
  last-self-remediation: ""
  # Circuit breaker state version
  version: "1"