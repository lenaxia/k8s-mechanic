apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mendabot-alerts
  labels:
    app.kubernetes.io/name: mendabot
    app.kubernetes.io/component: watcher
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: mendabot.remediation
      interval: 60s
      rules:
        - alert: MendabotSelfRemediationSuccessRateLow
          expr: |
            mendabot_self_remediation_success_rate < 0.5
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Self-remediation success rate below 50%"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              has a self-remediation success rate of {{ $value | humanizePercentage }}.
              Indicates repeated agent failures. Check agent Job logs.

        - alert: MendabotSelfRemediationSuccessRateDegraded
          expr: |
            mendabot_self_remediation_success_rate < 0.8
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Self-remediation success rate degraded"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              has a self-remediation success rate of {{ $value | humanizePercentage }}.

        - alert: MendabotHighFailureRate
          expr: |
            rate(mendabot_self_remediation_attempts_total{success="false"}[10m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High self-remediation failure rate"
            description: >
              Provider {{ $labels.provider }} is failing more than 1 self-remediation
              every 10 seconds over the last 5 minutes.

    - name: mendabot.cascade
      interval: 60s
      rules:
        - alert: MendabotCircuitBreakerHighActivationRate
          expr: |
            rate(mendabot_circuit_breaker_activations_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Circuit breaker activating frequently"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              circuit breaker is activating at {{ $value | humanize }} trips/sec.
              Repeated self-remediation cycles are being suppressed.

        - alert: MendabotCircuitBreakerStuckOpen
          expr: |
            mendabot_circuit_breaker_cooldown_seconds > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Circuit breaker has been open for over 30 minutes"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              circuit breaker cooldown has been active for more than 30 minutes
              ({{ $value | humanizeDuration }} remaining).
              Verify the agent is not in a failure loop.

        - alert: MendabotDeepCascadeDetected
          expr: |
            increase(mendabot_max_depth_exceeded_total[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Self-remediation cascade has hit maximum configured depth"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              has a self-remediation chain at depth {{ $labels.depth }}, which
              equals or exceeds the configured maximum. Review SELF_REMEDIATION_MAX_DEPTH.

        - alert: MendabotHighCascadeSuppressionRate
          expr: |
            rate(mendabot_cascade_suppressions_total[10m]) > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High rate of cascade suppression events"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              is suppressing findings at {{ $value | humanize }} events/sec
              (suppression_type={{ $labels.suppression_type }}).
              This may indicate an infrastructure-level failure cascade.

        - alert: MendabotInfrastructureCascadeSuppressing
          expr: |
            rate(mendabot_cascade_suppressions_total{suppression_type="infrastructure_cascade"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Infrastructure cascade suppression is active"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              is suppressing findings due to an infrastructure-level cascade
              (node failure, node pressure, or namespace-wide failure).
              Investigate root cause before individual pod findings are re-enabled.

        - alert: MendabotCascadeChainDepthHigh
          expr: |
            histogram_quantile(0.95, sum(rate(mendabot_chain_depth_distribution_bucket[10m])) by (le, provider, namespace)) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "95th percentile cascade chain depth is high"
            description: >
              Provider {{ $labels.provider }} in namespace {{ $labels.namespace }}
              95th percentile chain depth is {{ $value }}. Consider reducing
              SELF_REMEDIATION_MAX_DEPTH or investigating why remediations are failing.
