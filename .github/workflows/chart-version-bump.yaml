name: Bump Chart appVersion

# Triggered when a release tag (v*) is pushed.
# Updates appVersion in Chart.yaml to match the new tag, then commits to main.
#
# Chart versioning policy:
#   appVersion — tracks the app release tag (e.g. v0.4.1); updated here automatically
#   version    — chart semver; bumped manually when chart templates/values change
#
# These are intentionally decoupled: a new app release updates appVersion (which
# image the chart deploys), but does not blindly overwrite a chart version that
# may already have been bumped for chart-only changes in the same cycle.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to push the version-bump commit

jobs:
  bump-app-version:
    name: Bump appVersion in Chart.yaml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          # Use a PAT or the default GITHUB_TOKEN. GITHUB_TOKEN pushes bypass
          # branch protection only if "Allow GitHub Actions to create and
          # approve pull requests" is enabled in repo settings. If your branch
          # protection requires a PAT, set a RELEASE_PAT secret and use:
          #   token: ${{ secrets.RELEASE_PAT }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Extract tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Update appVersion only
        run: |
          CHART="charts/mechanic/Chart.yaml"
          TAG="${{ steps.version.outputs.tag }}"

          sed -i "s/^appVersion:.*/appVersion: ${TAG}/" "$CHART"

          echo "--- Updated Chart.yaml ---"
          grep -E '^(version|appVersion):' "$CHART"

      - name: Commit and push
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/mechanic/Chart.yaml
          git diff --cached --exit-code && echo "No changes to commit." && exit 0

          git commit -m "chore(chart): bump appVersion to ${TAG} [skip ci]"
          git push origin main
