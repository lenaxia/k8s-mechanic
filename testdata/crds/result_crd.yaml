apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: results.core.k8sgpt.ai
spec:
  group: core.k8sgpt.ai
  names:
    kind: Result
    listKind: ResultList
    plural: results
    singular: result
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              backend:
                type: string
              kind:
                type: string
              name:
                type: string
              error:
                type: array
                items:
                  type: object
                  properties:
                    text:
                      type: string
                    sensitive:
                      type: array
                      items:
                        type: object
                        properties:
                          unmasked:
                            type: string
                          masked:
                            type: string
              details:
                type: string
              parentObject:
                type: string
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
