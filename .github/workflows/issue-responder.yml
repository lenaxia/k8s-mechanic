name: Issue Responder

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # New issue opened — PROMPT is required by opencode github run for issues events
  handle-new-issue:
    if: |
      github.event_name == 'issues' &&
      github.event.sender.login == 'lenaxia'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai-compatible/default
          use_github_token: "true"
          share: "false"
          prompt: |
            You are an AI assistant for the k8s-mendabot repository. Analyze this GitHub issue and take the appropriate action.

            Repository: k8s-mendabot — a Kubernetes operator (Go/controller-runtime) that watches cluster events, uses an LLM to diagnose issues, and optionally remediates them via RemediationJob CRDs. Single maintainer: @lenaxia.

            Key directories:
            - cmd/               — operator entrypoints
            - internal/          — controller, agent, jobbuilder, redact wrappers
            - api/               — CRD types (RemediationJob, MendabotConfig)
            - charts/mendabot/   — Helm chart
            - docs/              — architecture, security docs (THREAT_MODEL, pentest findings)
            - docker/            — Dockerfiles, smoke/wrapper test scripts
            - .github/workflows/ — CI/CD pipelines

            Rules:
            1. Always post a response comment on the issue before finishing.
            2. For code/file changes: create a feature branch and open a PR — never commit directly to main.
            3. Feature branch naming: feat/issue-{number}-<short-description>
            4. PR body must include "Closes #{number}" and a summary of changes.
            5. Never handle or create secrets.
            6. Flag any change touching internal/redact/, RBAC, CRD schema, or secrets handling as requiring security review.
            7. If the request is ambiguous, ask for clarification in a comment.

            Analyze this issue, determine what action to take, and execute it.

  # Comment on an issue or PR — comment body is the user prompt, /ai prefix required
  handle-comment:
    if: |
      github.event.sender.login == 'lenaxia' &&
      (
        (github.event_name == 'issue_comment' && (startsWith(github.event.comment.body, '/ai') || contains(github.event.comment.body, ' /ai'))) ||
        (github.event_name == 'pull_request_review_comment' && (startsWith(github.event.comment.body, '/ai') || contains(github.event.comment.body, ' /ai')))
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai-compatible/default
          use_github_token: "true"
          share: "false"
          mentions: /ai
